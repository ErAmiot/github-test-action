name: Une Matrice
on: workflow_dispatch

jobs:
    test:
        runs-on: ${{matrix.os}}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
                version: [18,20,22]
        steps:
            - run: echo "Testing on ${{matrix.os}}"
            - name: node setup
              uses: actions/setup-node@v6
              with:
                  node-version: ${{matrix.version}}
            - run: node -v
